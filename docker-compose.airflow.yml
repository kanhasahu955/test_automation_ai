# -----------------------------------------------------------------------------
# Optional Airflow stack for local development.
# Brings up Apache Airflow in **standalone** mode (web + scheduler + triggerer
# in one container) so you can validate that DAGs trigger the QualityForge API.
#
# Usage:
#   make airflow-up         # start the standalone Airflow on http://localhost:8088
#   make airflow-down       # stop & remove the container
#
# Airflow logs in with username `admin` and a password printed once on first
# boot in the container logs. After that you can also reset it with
#   docker exec qf_airflow airflow users reset-password --username admin --password 'admin'
# -----------------------------------------------------------------------------

services:
  airflow:
    image: apache/airflow:2.10.3-python3.12
    container_name: qf_airflow
    restart: unless-stopped
    user: "50000:0"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: "8088"
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      QF_API_BASE: http://host.docker.internal:8000/api/v1
    volumes:
      - ./backend/app/airflow_dags:/opt/airflow/dags:ro
      - airflow_db:/opt/airflow
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8088:8088"
    command: bash -c "airflow standalone"
    networks:
      - qf_net

volumes:
  airflow_db:

networks:
  qf_net:
    external: true
    name: qualityforge-ai_qf_net
