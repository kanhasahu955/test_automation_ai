user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 25m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ------------------------------------------------------------------
    # Docker's embedded DNS server lives at 127.0.0.11. Tell Nginx to
    # use it so service hostnames (`backend`, `frontend`) are re-resolved
    # at runtime — otherwise Nginx caches the IP at boot and starts
    # returning 502 the moment a service container restarts and gets a
    # new IP from the Docker bridge network.
    # ------------------------------------------------------------------
    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name _;

        # Variables force Nginx to use the `resolver` above on every
        # request instead of caching the upstream IP at startup.
        set $backend  "backend:8000";
        set $frontend "frontend:80";

        location /api/ {
            proxy_pass         http://$backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /docs {
            proxy_pass http://$backend;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://$backend;
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://$backend;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass         http://$frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
